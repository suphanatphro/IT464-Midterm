version: '3.8'

services:
  # 1. ฐานข้อมูล (Database)
  db:
    image: mysql:8.0
    container_name: ${MY_USERNAME}-db
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_pass
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_pass
    secrets:
      - db_pass
    volumes:
      - db-storage:/var/lib/mysql
      - ./sql/script-data.sql:/docker-entrypoint-initdb.d/script-data.sql
    networks:
      - backend-zone

  # 2. ส่วนประมวลผล (Backend)
  app:
    image: php:8.1-fpm
    container_name: ${MY_USERNAME}-app
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db
    networks:
      - backend-zone

  # 3. ส่วนรับงานหน้าบ้าน (Web Proxy)
  web:
    image: nginx:alpine
    container_name: ${MY_USERNAME}-web
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./app:/var/www/html
    configs:
      - nginx_config
    networks:
      - frontend-zone
      - backend-zone

  # 4. ส่วนจัดการฐานข้อมูล (phpMyAdmin)
  pma:
    image: phpmyadmin/phpmyadmin
    container_name: ${MY_USERNAME}-pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PMA_PORT}:80"
    depends_on:
      - db
    networks:
      - frontend-zone
      - backend-zone

secrets:
  db_pass:
    file: ./secrets/db_pass.txt

configs:
  nginx_config:
    file: ./nginx/shift-nginx.conf

volumes:
  db-storage:

networks:
  frontend-zone:
  backend-zone: